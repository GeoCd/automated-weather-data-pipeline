name: Daily Weather Data Pipeline

on:
  schedule:
    - cron: '1 6 * * *'  # 00:01 CDMX = 06:01 UTC
  workflow_dispatch:     # for testing

permissions:
  contents: write        # push updated CSVs to repo

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Install Chrome and Chromedriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python main_pipeline.py --mode batch --trainAgain

      - name: Update submodule to latest commit
        run: |
          git submodule update --init --recursive --remote -f

      - name: Commit and push changes inside the Submodule Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          cd mx-weather-datasets
          git checkout main

          git add .
          git diff-index --quiet HEAD || git commit -m "chore: upload daily weather data $(date +'%Y-%m-%d')"
          git push origin main

      - name: Update parent repository pointer
        run: |
          git add mx-weather-datasets
          git add scraped/
          git add models/
          
          git diff --cached --quiet HEAD || git commit -m "chore: daily data update and submodule sync $(date +'%Y-%m-%d')"
          git push origin HEAD